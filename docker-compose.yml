version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ENV: production
      DEBUG: "true"
      API_KEY: change-me-in-production
      REDIS_URL: redis://redis-cache:6379/0
    ports:
      - "8000:8000"
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always
